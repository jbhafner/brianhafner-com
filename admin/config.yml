backend:
  name: git-gateway
  branch: main

# Where uploaded images live in the repo, and the public URL prefix Eleventy serves them at.
media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/blog/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD" }
      - { label: "Description", name: "description", widget: "text", hint: "Shown on the blog listing page and used as the SEO meta description. Aim for 1-2 sentences." }
      - { label: "Body", name: "body", widget: "markdown" }
